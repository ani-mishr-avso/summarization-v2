# Runtime configuration. Override path via APP_CONFIG env var.

strategic_llm:
  model_name: "openai/gpt-oss-120b"
  temperature: 0.1
  reasoning_effort: "high"
  service_tier: "auto"
  max_completion_tokens: 2048

technical_llm:
  model_name: "openai/gpt-oss-20b"
  temperature: 0.5
  reasoning_effort: "medium"
  service_tier: "auto"
  max_completion_tokens: 12000

routing:
  fallback_confidence_levels: {"LOW", "MEDIUM"}
  min_word_count: 200
  call_type_to_path:
    "AE/Sales": "ae_path"
    "CSM/Post-Sale": "csm_path"
    "Internal/Implementation": "internal_path"
    "SDR/Outbound": "sdr_path"

call_types:
  - "AE/Sales"
  - "CSM/Post-Sale"
  - "Internal/Implementation"
  - "SDR/Outbound"
  - "Unclassified"

csm:
  qbr_duration_minutes: 45
  qbr_template: "qbr_variant"
  general_template: "general_post_sale"

methodology:
  default_sales_methodology: "MEDDPICC"

seller_insights:
  discovery:
    role_title: "Negotiation & Communication Analyst (Voss Framework - Discovery)"
    role_goal: "You are an expert in the Chris Voss \"Never Split the Difference\" negotiation framework. Your goal is to evaluate the Seller's ability to build rapport, gather intelligence, and uncover hidden constraints during an initial Discovery call."
    primary_dimensions:
      - "Calibrated Questions"
      - "Tactical Empathy"
      - "Labeling"
    secondary_dimensions:
      - "Mirroring"
      - "Getting to That's Right"
      - "Black Swan Discovery"
  demo:
    role_title: "Negotiation & Communication Analyst (Voss Framework - Demo)"
    role_goal: "You are an expert in the Chris Voss \"Never Split the Difference\" negotiation framework. Your goal is to evaluate the Seller's communication effectiveness during a product demonstration."
    primary_dimensions:
      - "Labeling"
      - "Getting to That's Right"
      - "Calibrated Questions"
    secondary_dimensions:
      - "Mirroring"
      - "Tactical Empathy"
      - "Accusation Audit"
      - "Black Swan Discovery"
  negotiation:
    role_title: "Negotiation Analyst (Voss Framework - Final Negotiation/Close)"
    role_goal: "You are an expert in the Chris Voss \"Never Split the Difference\" negotiation framework. Your goal is to evaluate the Seller's performance during a final-stage negotiation focused on commercial terms, legal review, and signature commitment."
    primary_dimensions:
      - "Black Swan Discovery"
      - "Accusation Audit"
      - "Getting to That's Right"
    secondary_dimensions:
      - "Calibrated Questions"
      - "Mirroring"
      - "Tactical Empathy"
      - "Labeling"
  proposal:
    role_title: "Negotiation & Communication Analyst (Voss Framework - Proposal)"
    role_goal: "You are an expert in the Chris Voss \"Never Split the Difference\" negotiation framework. Your goal is to evaluate the Seller's ability to drive commercial alignment and handle late-stage friction during a proposal or business case presentation."
    primary_dimensions:
      - "Accusation Audit"
      - "Tactical Empathy"
      - "Getting to That's Right"
    secondary_dimensions:
      - "Calibrated Questions"
      - "Labeling"
      - "Mirroring"
      - "Black Swan Discovery"

fallback:
  prompt_category: "fallback"
  prompt_name: "fallback_template"
  expert_type_label: "Unclassified"

meddpicc:
  health_signal:
    green_above: 0.75
    yellow_above: 0.45
  status_map:
    0: "missing"
    1: "vague"
    2: "validated"
    3: "aligned"
    4: "confirmed"
    5: "fully confirmed"
  default_weights:
    metrics: 0.125
    economic_buyer: 0.125
    decision_criteria: 0.125
    decision_process: 0.125
    paper_process: 0.125
    identify_pain: 0.125
    champion: 0.125
    competition: 0.125
  stage_weights:
    discovery:
      metrics: 0.15
      economic_buyer: 0.10
      decision_criteria: 0.10
      decision_process: 0.05
      paper_process: 0.00
      identify_pain: 0.40
      champion: 0.15
      competition: 0.05
    demo:
      metrics: 0.15
      economic_buyer: 0.10
      decision_criteria: 0.25
      decision_process: 0.10
      paper_process: 0.05
      identify_pain: 0.20
      champion: 0.10
      competition: 0.05
    proposal:
      metrics: 0.20
      economic_buyer: 0.20
      decision_criteria: 0.10
      decision_process: 0.15
      paper_process: 0.10
      identify_pain: 0.10
      champion: 0.10
      competition: 0.05
    negotiation:
      metrics: 0.10
      economic_buyer: 0.20
      decision_criteria: 0.05
      decision_process: 0.20
      paper_process: 0.30
      identify_pain: 0.05
      champion: 0.05
      competition: 0.05
